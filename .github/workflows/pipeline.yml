name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python linter
        run: pip install flake8

      - name: Lint Python files
        run: flake8 api/ worker/ --max-line-length=120 --exclude=api/tests/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install ESLint
        run: cd frontend && npm install eslint --save-dev

      - name: Lint JavaScript
        run: cd frontend && npx eslint app.js || true

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        run: |
          cd api
          pytest tests/ --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov/

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

  security:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t frontend:latest ./frontend
          docker build -t api:latest ./api
          docker build -t worker:latest ./worker

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:latest
          format: sarif
          output: frontend-trivy.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:latest
          format: sarif
          output: api-trivy.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Scan worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worker:latest
          format: sarif
          output: worker-trivy.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: .

  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=
          API_URL=http://api:8000
          FRONTEND_PORT=3000
          API_PORT=8000
          WORKER_CONCURRENCY=2
          APP_ENV=production
          EOF

      - name: Start stack
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          for i in $(seq 1 30); do
            HEALTHY=$(docker compose ps | grep -c "healthy" || true)
            echo "Healthy services: $HEALTHY - attempt $i/30"
            if [ "$HEALTHY" -ge 3 ]; then
              echo "All services healthy!"
              break
            fi
            sleep 10
          done
          docker compose ps
          docker compose logs api

      - name: Submit job and verify completion
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit \
            -H "Content-Type: application/json" \
            -d '{"data": "test-job"}')
          echo "Submit response: $RESPONSE"

          JOB_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          for i in $(seq 1 30); do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/hng14-stage2-devops
            git pull origin main

            docker compose up -d --no-deps --build api

            for i in $(seq 1 12); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
                $(docker compose ps -q api) 2>/dev/null)
              if [ "$STATUS" = "healthy" ]; then
                echo "API healthy, deploying remaining services"
                docker compose up -d --no-deps --build worker
                docker compose up -d --no-deps --build frontend
                exit 0
              fi
              echo "Waiting for health check... attempt $i/12"
              sleep 5
            done
            echo "Health check failed - aborting"
            exit 1
